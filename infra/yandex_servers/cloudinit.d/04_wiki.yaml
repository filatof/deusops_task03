#cloud-config
datasource:
  Ec2:
    strict_id: false
ssh_pwauth: no
users:
 - name: fill
   sudo: 'ALL=(ALL) NOPASSWD:ALL'
   shell: /bin/bash
   ssh_authorized_keys:
   - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIL+O6cXczlSLnL0wZSMe6qRNKpfbdiG6BtYwCmvi5ctR fill@Macmini.local
   - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOlPFhFwKepToM3D/5wgUfFsPsv99sZkfUr9gnuhYYr/ fill@MacBookAir.local
   - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIN6DtL2KzXFUB43Z4LZrqLMc7YY2rlAUjtCl6EpycHBq Generated By Termius
   - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDeQO0sjS7XJIZEYtbNIh07FQJymzGY3+XBaJEa7XEdK fill@test
packages:
  []

# Делаем обратный прокси
write_files:
  - path: /opt/wiki/docker-compose.yaml
    content: |
      services:
        wiki:
          image: requarks/wiki:2
          environment:
            DB_TYPE: ${DB_TYPE}
            DB_HOST: ${DB_HOST}
            DB_PORT: ${DB_PORT}
            DB_USER: ${DB_USER}
            DB_PASS: ${DB_PASS}
            DB_NAME: ${DB_NAME}
          restart: unless-stopped
          ports:
            - "80:3000"
  - path: /opt/wiki/.env
    content: |
      DB_TYPE=postgres
      DB_HOST=10.10.1.20
      DB_PORT=5432
      DB_USER=wiki
      DB_PASS=wiki_pass
      DB_NAME=wikidb

  - path: /usr/local/bin/setup-wiki.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      echo "=== Installing Docker ===" 
      curl -s https://get.docker.com | bash

      echo "=== Waiting for Docker ===" 
      systemctl enable docker
      systemctl start docker

      # Ждём пока docker поднимется
      for i in $(seq 1 30); do
        docker info >/dev/null 2>&1 && break
        echo "Waiting for docker... $i"
        sleep 2
      done

      echo "=== Starting n8n ==="
      cd /opt/wiki
      docker compose up -d
      echo "=== DONE ==="

runcmd:
  - bash /usr/local/bin/setup-wiki.sh >> /var/log/setup-wiki.log 2>&1

