#cloud-config
datasource:
  Ec2:
    strict_id: false
ssh_pwauth: no
users:
 - name: fill
   sudo: 'ALL=(ALL) NOPASSWD:ALL'
   shell: /bin/bash
   ssh_authorized_keys:
   - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIL+O6cXczlSLnL0wZSMe6qRNKpfbdiG6BtYwCmvi5ctR fill@Macmini.local
   - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOlPFhFwKepToM3D/5wgUfFsPsv99sZkfUr9gnuhYYr/ fill@MacBookAir.local
   - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIN6DtL2KzXFUB43Z4LZrqLMc7YY2rlAUjtCl6EpycHBq Generated By Termius
   - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDeQO0sjS7XJIZEYtbNIh07FQJymzGY3+XBaJEa7XEdK fill@test
packages:
  []

# Делаем обратный прокси
write_files:
  - path: /opt/n8n/docker-compose.yaml
    content: |
      services:
        n8n:
          image: n8nio/n8n:2.6.4
          container_name: n8n
          restart: unless-stopped
          ports:
            - "5678:5678"
          environment:
            DB_TYPE: postgresdb
            DB_POSTGRESDB_HOST: ${DB_POSTGRESDB_HOST}
            DB_POSTGRESDB_PORT: ${DB_POSTGRESDB_PORT}
            DB_POSTGRESDB_DATABASE: ${DB_POSTGRESDB_DATABASE}
            DB_POSTGRESDB_USER: ${DB_POSTGRESDB_USER}
            DB_POSTGRESDB_PASSWORD: ${DB_POSTGRESDB_PASSWORD}
            DB_POSTGRESDB_SCHEMA: ${DB_POSTGRESDB_SCHEMA}
            N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE}
            N8N_RUNNERS_MODE: internal
          volumes:
            - n8n_data:/home/node/.n8n
      volumes:
        n8n_data:
  - path: /opt/n8n/.env
    content: |
      DB_POSTGRESDB_HOST=10.10.1.20
      DB_POSTGRESDB_PORT=5432
      DB_POSTGRESDB_DATABASE=n8ndb
      DB_POSTGRESDB_USER=n8n
      DB_POSTGRESDB_PASSWORD=n8n_pass
      DB_POSTGRESDB_SCHEMA=public
      N8N_SECURE_COOKIE=false
  - path: /usr/local/bin/setup-n8n.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      echo "=== Installing Docker ===" 
      curl -s https://get.docker.com | bash

      echo "=== Waiting for Docker ===" 
      systemctl enable docker
      systemctl start docker

      # Ждём пока docker поднимется
      for i in $(seq 1 30); do
        docker info >/dev/null 2>&1 && break
        echo "Waiting for docker... $i"
        sleep 2
      done

      echo "=== Starting n8n ==="
      cd /opt/n8n
      docker compose up -d
      echo "=== DONE ==="

runcmd:
  - bash /usr/local/bin/setup-n8n.sh >> /var/log/setup-n8n.log 2>&1

