 - name: fill
   sudo: 'ALL=(ALL) NOPASSWD:ALL'
   shell: /bin/bash
   ssh_authorized_keys:
   - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIL+O6cXczlSLnL0wZSMe6qRNKpfbdiG6BtYwCmvi5ctR fill@Macmini.local
   - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOlPFhFwKepToM3D/5wgUfFsPsv99sZkfUr9gnuhYYr/ fill@MacBookAir.local
   - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIN6DtL2KzXFUB43Z4LZrqLMc7YY2rlAUjtCl6EpycHBq Generated By Termius
   - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDeQO0sjS7XJIZEYtbNIh07FQJymzGY3+XBaJEa7XEdK fill@test

write_files:
  - path: /opt/postgre/docker-entrypoint-initdb.d/01-create-users.sql
    content: |
      CREATE USER wiki WITH PASSWORD 'wiki_pass';
      CREATE USER n8n WITH PASSWORD 'n8n_pass';
      CREATE USER ollama WITH PASSWORD 'ollama_pass';

  - path: /opt/postgre/docker-entrypoint-initdb.d/02-create-databases.sql
    content: |
      CREATE DATABASE wikidb OWNER wiki;
      CREATE DATABASE n8ndb OWNER n8n;
      CREATE DATABASE ollamadb OWNER ollama;
      GRANT ALL PRIVILEGES ON DATABASE wikidb TO wiki;
      GRANT ALL PRIVILEGES ON DATABASE n8ndb TO n8n;
      GRANT ALL PRIVILEGES ON DATABASE ollamadb TO ollama;

  - path: /opt/postgre/docker-compose.yaml
    content: |
      services:
        postgres:
          image: postgres:18.3
          container_name: postgres_container
          environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres_pass
            PGDATA: /var/lib/postgresql/data/pgdata
          ports:
            - "0.0.0.0:5432:5432"
          volumes:
            - ./pgdata:/var/lib/postgresql/data/pgdata
            - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
          deploy:
            resources:
              limits:
                cpus: '0.50'
                memory: 512M
              reservations:
                cpus: '0.25'
                memory: 256M
          command: >
            postgres -c max_connections=1000
                     -c shared_buffers=256MB
                     -c effective_cache_size=768MB
                     -c maintenance_work_mem=64MB
                     -c checkpoint_completion_target=0.7
                     -c wal_buffers=16MB
                     -c default_statistics_target=100
                     -c listen_addresses='*'
          healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
            interval: 30s
            timeout: 10s
            retries: 5
          restart: unless-stopped

  - path: /usr/local/bin/setup-postgre.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      echo "=== $(date) START ===" >> /var/log/setup-postgre.log

      # Устанавливаем Docker
      curl -fsSL https://get.docker.com | bash >> /var/log/setup-postgre.log 2>&1

      systemctl enable docker
      systemctl start docker

      # Ждём пока Docker поднимется
      echo "Waiting for Docker..." >> /var/log/setup-postgre.log
      for i in $(seq 1 30); do
        docker info >/dev/null 2>&1 && break
        echo "  attempt $i..." >> /var/log/setup-postgre.log
        sleep 3
      done

      # Запускаем compose
      echo "Starting docker compose..." >> /var/log/setup-postgre.log
      cd /opt/postgre
      docker compose up -d >> /var/log/setup-postgre.log 2>&1

      echo "=== $(date) DONE ===" >> /var/log/setup-postgre.log
      docker ps >> /var/log/setup.log 2>&1

runcmd:
  - bash /usr/local/bin/setup-postgre.sh