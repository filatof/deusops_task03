#cloud-config
datasource:
  Ec2:
    strict_id: false

ssh_pwauth: false

users:
  - name: fill
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIL+O6cXczlSLnL0wZSMe6qRNKpfbdiG6BtYwCmvi5ctR fill@Macmini.local
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOlPFhFwKepToM3D/5wgUfFsPsv99sZkfUr9gnuhYYr/ fill@MacBookAir.local
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIN6DtL2KzXFUB43Z4LZrqLMc7YY2rlAUjtCl6EpycHBq Generated By Termius
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDeQO0sjS7XJIZEYtbNIh07FQJymzGY3+XBaJEa7XEdK fill@test

#  Обновление пакетов
package_update: true
package_upgrade: false

packages:
  - nginx
  - curl

#  Файлы
write_files:

  # nginx конфиг
  - path: /etc/nginx/sites-available/bastion
    permissions: '0644'
    content: |
      server {
          listen 80;
          server_name n8n.eqlan.su bastion.eqlan.su;
          return 301 https://$host$request_uri;
      }

      server {
          listen 443 ssl;
          server_name n8n.eqlan.su;

          ssl_certificate     /etc/nginx/certs/fullchain.pem;
          ssl_certificate_key /etc/nginx/certs/privkey.pem;

          location / {
              proxy_pass http://10.10.1.10:5678;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }
      }

      server {
          listen 443 ssl;
          server_name wiki.eqlan.su;

          ssl_certificate     /etc/nginx/certs/fullchain.pem;
          ssl_certificate_key /etc/nginx/certs/privkey.pem;

          location / {
              proxy_pass http://10.10.1.30;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }
      }

  # скрипт обновления сертификата
  - path: /usr/local/bin/update-cert.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -e

      /usr/local/bin/yc certificate-manager certificate content \
        --id fpqe2qkqm94kqbfml280 \
        --chain /etc/nginx/certs/fullchain.pem \
        --key /etc/nginx/certs/privkey.pem

      chmod 600 /etc/nginx/certs/privkey.pem
      nginx -t && systemctl reload nginx

#  Выполнение после установки пакетов
runcmd:
  - mkdir -p /etc/nginx/certs

  # Устанавливаем yc CLI с явным HOME
  - HOME=/root curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | HOME=/root bash -s -- -i /usr/local/yandex-cloud -n

  # Создаём симлинк
  - ln -sf /usr/local/yandex-cloud/bin/yc /usr/local/bin/yc

  # Получаем сертификат
  - /usr/local/bin/yc certificate-manager certificate content --id fpqe2qkqm94kqbfml280 --chain /etc/nginx/certs/fullchain.pem --key /etc/nginx/certs/privkey.pem

  - chmod 600 /etc/nginx/certs/privkey.pem

  # Активируем nginx конфиг
  - ln -sf /etc/nginx/sites-available/bastion /etc/nginx/sites-enabled/bastion
  - rm -f /etc/nginx/sites-enabled/default

  - systemctl enable nginx
  - systemctl restart nginx

  - echo "0 3 * * 1 root /usr/local/bin/update-cert.sh" >> /etc/crontab