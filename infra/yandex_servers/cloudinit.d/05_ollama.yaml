    strict_id: false
ssh_pwauth: no
users:
 - name: fill
   sudo: 'ALL=(ALL) NOPASSWD:ALL'
   shell: /bin/bash
   ssh_authorized_keys:
   - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIL+O6cXczlSLnL0wZSMe6qRNKpfbdiG6BtYwCmvi5ctR fill@Macmini.local
   - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOlPFhFwKepToM3D/5wgUfFsPsv99sZkfUr9gnuhYYr/ fill@MacBookAir.local
   - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIN6DtL2KzXFUB43Z4LZrqLMc7YY2rlAUjtCl6EpycHBq Generated By Termius
   - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDeQO0sjS7XJIZEYtbNIh07FQJymzGY3+XBaJEa7XEdK fill@test
packages:
  []

# Делаем обратный прокси
write_files:
  - path: /opt/ollama/docker-compose.yaml
    content: |
      services:
        ollama:
          image: ollama/ollama:0.18.2
          container_name: ollama
          restart: unless-stopped
          ports:
            - "11434:11434"
          volumes:
            - ollama_data:/root/.ollama
          environment:
            - OLLAMA_HOST=0.0.0.0
          # Если есть GPU
      #          deploy:
      #            resources:
      #              reservations:
      #                devices:
      #                  - driver: nvidia
      #                    count: all
      #                    capabilities: [gpu]

      volumes:
        ollama_data:
  - path: /usr/local/bin/setup-ollama.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      echo "=== Installing Docker ===" 
      curl -s https://get.docker.com | bash

      echo "=== Waiting for Docker ===" 
      systemctl enable docker
      systemctl start docker

      # Ждём пока docker поднимется
      for i in $(seq 1 30); do
        docker info >/dev/null 2>&1 && break
        echo "Waiting for docker... $i"
        sleep 2
      done

      echo "=== Starting n8n ==="
      cd /opt/ollama
      docker compose up -d
      echo "=== DONE ==="

runcmd:
  - bash /usr/local/bin/setup-ollama.sh >> /var/log/setup-ollama.log 2>&1

